openapi: 3.1.1
info:
  contact:
    email: support@joinaffinityai.com
    name: Affinity API Support
  description: "Affinity API for software platforms connecting practices to the compounder\
    \ network. A practice is the customer organization, a provider is an individual\
    \ clinician or prescriber, and a location is a physical practice site. The API\
    \ covers practice management, catalog discovery, prescription-order submission,\
    \ fulfillment tracking, and webhooks."
  title: Affinity API
  version: 2026-07-09
servers:
- description: Production
  url: https://api.joinaffinityai.com
security:
- bearerAuth: []
- affinityApiKey: []
paths:
  /v1/auth/access:
    get:
      description: "Returns the authenticated API key subject, mode, and scopes."
      operationId: getApiAccess
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/getApiAccess_200_response"
          description: Successful response
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
        "409":
          $ref: "#/components/responses/ErrorResponse"
        "422":
          $ref: "#/components/responses/ErrorResponse"
        "429":
          $ref: "#/components/responses/ErrorResponse"
      summary: Read API key access
      tags:
      - API Keys
      x-pier:
        domain: platform.public-api
        exportName: apiAccess
        file: apps/api-v2/src/routes/platform/public-api/public-api.endpoints.ts
        name: platform.public-api.apiAccess
        visibility: public
  /v1/catalog/items:
    get:
      description: Searches the Affinity catalog across all connected compounders
        and routing restrictions.
      operationId: listCatalogItems
      parameters:
      - explode: true
        in: query
        name: query
        required: false
        schema:
          maxLength: 120
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listCatalogItems_200_response"
          description: Successful response
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
        "409":
          $ref: "#/components/responses/ErrorResponse"
        "422":
          $ref: "#/components/responses/ErrorResponse"
        "429":
          $ref: "#/components/responses/ErrorResponse"
      summary: List catalog items
      tags:
      - Catalog
      x-pier:
        domain: platform
        exportName: catalogItems
        file: apps/api-v2/src/routes/platform/platform.endpoints.ts
        name: platform.catalogItems
        visibility: public
  /v1/orders:
    get:
      operationId: listOrders
      parameters:
      - explode: true
        in: query
        name: externalOrderId
        required: false
        schema:
          maxLength: 120
          minLength: 1
          type: string
        style: form
      - explode: true
        in: query
        name: patientExternalId
        required: false
        schema:
          maxLength: 120
          minLength: 1
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listOrders_200_response"
          description: Successful response
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
        "409":
          $ref: "#/components/responses/ErrorResponse"
        "422":
          $ref: "#/components/responses/ErrorResponse"
        "429":
          $ref: "#/components/responses/ErrorResponse"
      summary: List platform orders
      tags:
      - Platform Orders
      x-pier:
        domain: platform
        exportName: orders
        file: apps/api-v2/src/routes/platform/platform.endpoints.ts
        name: platform.orders
        visibility: public
    post:
      description: Creates an editable synthetic draft in test mode or releases an
        existing signed immutable prescription version in live mode.
      operationId: createOrder
      requestBody:
        content:
          application/json:
            examples:
              example1:
                value:
                  catalogItemId: catalog_item_123
                  practiceId: 3f4bd943-a34d-4d4c-aa41-00556569a71d
                  directions: Inject 0.25 mL subcutaneously once weekly.
                  externalOrderId: order_123
                  patient:
                    address:
                      city: Los Angeles
                      country: US
                      line1: 100 Main Street
                      line2: null
                      postalCode: "90001"
                      state: CA
                    dateOfBirth: 1988-05-12
                    email: patient@example.com
                    externalPatientId: patient_123
                    name: Example Patient
                    state: CA
                  prescriber:
                    credentials: MD
                    licenseStates:
                    - CA
                    name: Alex Morgan
                    npi: "1234567893"
                  prescription:
                    authorized: true
                    signedAt: 2026-07-10T12:00:00.000Z
                  quantity: 1
              example2:
                value:
                  practiceId: 3f4bd943-a34d-4d4c-aa41-00556569a71d
                  externalOrderId: live_order_123
                  pharmacyOrganizationId: 90c3eede-38fb-4d99-a1ae-a85c647e232d
                  prescriptionId: 6fb62918-a7e5-4b39-8f98-296bc16e8db5
                  prescriptionVersionId: 2a630ae6-f161-4aa5-ad3f-df98b8449398
                  registeredLocationId: ccf0fc8b-e3f5-47a6-8d5f-f00fd4ab2ddf
                  shippingAddress:
                    city: Los Angeles
                    country: US
                    line1: 100 Main Street
                    line2: null
                    postalCode: "90001"
                    state: CA
            schema:
              $ref: "#/components/schemas/createOrder_request"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/createOrder_200_response"
          description: Successful response
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
        "409":
          $ref: "#/components/responses/ErrorResponse"
        "422":
          $ref: "#/components/responses/ErrorResponse"
        "429":
          $ref: "#/components/responses/ErrorResponse"
      summary: Create order
      tags:
      - Platform Orders
      x-pier:
        domain: platform
        exportName: orderCreate
        file: apps/api-v2/src/routes/platform/platform.endpoints.ts
        name: platform.orderCreate
        visibility: public
  /v1/orders/{orderId}:
    get:
