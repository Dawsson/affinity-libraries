                  complianceContact: null
                  externalId: practice_123
                  legalName: Example Medical Group PLLC
                  metadata: {}
                  name: Example Medical Group
                  prescribers:
                  - credentials: MD
                    licenseStates:
                    - CA
                    name: Alex Morgan
                    npi: "1234567893"
                  primaryContact:
                    email: operations@example-practice.com
                    name: Jordan Lee
                    phone: null
                  supportEmail: support@example-practice.com
                  supportPhone: null
                  timezone: America/Los_Angeles
            schema:
              $ref: "#/components/schemas/createPractice_request"
        required: true
