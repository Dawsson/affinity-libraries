            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Bad request
          headers:
            Affinity-Version:
              $ref: "#/components/headers/AffinityVersion"
            RateLimit-Limit:
              explode: false
              schema:
                type: integer
              style: simple
            RateLimit-Remaining:
              explode: false
              schema:
                type: integer
              style: simple
            RateLimit-Reset:
              explode: false
              schema:
                type: integer
              style: simple
            Request-Id:
              $ref: "#/components/headers/RequestId"
          x-affinity-error-codes:
          - idempotency_key_too_long
          - invalid_cursor
          - invalid_id
          - invalid_request
          - practice_attestation_required
          - unsupported_api_version
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Unauthorized
          headers:
            Affinity-Version:
              $ref: "#/components/headers/AffinityVersion"
            RateLimit-Limit:
              explode: false
              schema:
                type: integer
              style: simple
            RateLimit-Remaining:
              explode: false
              schema:
                type: integer
              style: simple
            RateLimit-Reset:
              explode: false
              schema:
                type: integer
              style: simple
            Request-Id:
              $ref: "#/components/headers/RequestId"
          x-affinity-error-codes:
