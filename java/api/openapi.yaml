            application/json:
              schema:
                $ref: "#/components/schemas/GetAccountResponse"
          description: Successful response
          headers:
            Affinity-Version:
              $ref: "#/components/headers/AffinityVersion"
            RateLimit-Limit:
              explode: false
              schema:
                type: integer
              style: simple
            RateLimit-Remaining:
              explode: false
              schema:
                type: integer
              style: simple
            RateLimit-Reset:
              explode: false
              schema:
                type: integer
              style: simple
            Request-Id:
              $ref: "#/components/headers/RequestId"
        "400":
