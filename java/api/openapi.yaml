              explode: false
              schema:
                type: integer
              style: simple
            RateLimit-Remaining:
              explode: false
              schema:
                type: integer
              style: simple
            RateLimit-Reset:
              explode: false
              schema:
                type: integer
              style: simple
            Request-Id:
              $ref: "#/components/headers/RequestId"
        "400":
          content:
