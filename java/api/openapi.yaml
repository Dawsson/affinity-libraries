  /v1/catalog/items:
    get:
      description: Lists the catalog items that are eligible for the authenticated
        account and mode.
      operationId: listCatalogItems
      parameters:
      - explode: true
        in: query
        name: query
        required: false
        schema:
          maxLength: 120
          type: string
        style: form
      - explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 50
          maximum: 250
          minimum: 1
          type: integer
        style: form
      - explode: true
        in: query
        name: startingAfter
        required: false
