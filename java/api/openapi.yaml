      requestBody:
        content:
          application/json:
            examples:
              example1:
                value:
                  catalogItemId: cat_01j00000000000000000000000
                  practiceId: prac_01j00000000000000000000000
                  directions: Inject 0.25 mL subcutaneously once weekly.
                  externalOrderId: order_123
                  patient:
                    address:
                      city: Los Angeles
                      country: US
                      line1: 100 Main Street
                      line2: null
                      postalCode: "90001"
                      state: CA
                    dateOfBirth: 1988-05-12
                    email: patient@example.com
                    externalPatientId: patient_123
                    name: Example Patient
                    state: CA
                  prescriber:
                    credentials: MD
                    licenseStates:
                    - CA
                    name: Alex Morgan
                    npi: "1234567893"
                  prescription:
                    authorized: true
                    signedAt: 2026-07-10T12:00:00.000Z
                  quantity: 1
              example2:
                value:
                  practiceId: prac_01j00000000000000000000000
                  externalOrderId: live_order_123
                  pharmacyOrganizationId: pharm_01j00000000000000000000000
                  prescriptionId: rx_01j00000000000000000000000
                  prescriptionVersionId: rxv_01j00000000000000000000000
                  registeredLocationId: loc_01j00000000000000000000000
                  shippingAddress:
                    city: Los Angeles
                    country: US
                    line1: 100 Main Street
                    line2: null
                    postalCode: "90001"
                    state: CA
            schema:
              $ref: "#/components/schemas/CreateOrderRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateOrderResponse"
          description: Successful response
          headers:
